<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Translation Full Demo</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* FAKE GOOGLE BG */
        .google-bg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .google-logo {
            font-size: 70px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        .google-logo span:nth-child(1) { color: #4285F4; }
        .google-logo span:nth-child(2) { color: #EA4335; }
        .google-logo span:nth-child(3) { color: #FBBC05; }
        .google-logo span:nth-child(4) { color: #4285F4; }
        .google-logo span:nth-child(5) { color: #34A853; }
        .google-logo span:nth-child(6) { color: #EA4335; }

        .search-bar {
            width: 500px;
            height: 44px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 0 20px;
            font-size: 16px;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            display: flex;
            align-items: center;
        }
        #fakeSearchInput {
            border: none; outline: none;
            width: 100%; height: 100%;
            font-size: 16px;
        }

        /* SPACE TRANSLATION APP MOCKUP */
        .app-window {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 520px;
            height: 380px;
            background-color: #1E1E2E;
            border: 1px solid #313244;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 10;
        }

        .app-window.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .header { display: flex; justify-content: space-between; padding: 12px 15px 5px; }
        .title { color: #89B4FA; font-size: 13px; font-weight: bold; }
        .close-btn { color: #F38BA8; font-size: 12px; font-weight: bold; }
        .separator { height: 1px; background-color: #313244; margin: 8px 15px; }
        .controls { display: flex; align-items: center; padding: 0 15px; margin-bottom: 8px; gap: 8px; }
        select { background-color: #313244; color: #CDD6F4; border: none; padding: 5px 8px; border-radius: 4px; font-size: 12px; }
        .label { color: #6C7086; font-size: 11px; }
        .text-area-container { flex-grow: 1; margin: 0 15px 8px 15px; background-color: #11111B; border-radius: 4px; padding: 8px 10px; }
        textarea { width: 100%; height: 100%; background-color: transparent; border: none; color: #CDD6F4; font-family: 'Segoe UI', sans-serif; font-size: 14px; resize: none; outline: none; }
        textarea::placeholder { color: #6C7086; }
        .buttons { display: flex; padding: 0 15px 4px 15px; gap: 8px; }
        .btn { flex: 1; padding: 8px 12px; text-align: center; color: #1E1E2E; font-weight: bold; font-size: 11px; border-radius: 4px; }
        .btn-translate { background-color: #89B4FA; }
        .btn-insert { background-color: #CBA6F7; }
        .btn-action { background-color: #A6E3A1; }
        .shortcuts { text-align: center; color: #6C7086; font-size: 10px; margin-bottom: 6px; }

        /* FAKE CURSOR */
        #cursor {
            position: absolute;
            top: 60%; left: 80%;
            width: 24px; height: 24px;
            z-index: 9999;
            pointer-events: none;
            transition: top 0.4s ease-in-out, left 0.4s ease-in-out;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        .cursor-click {
            animation: click 0.2s;
        }

        @keyframes click {
            0% { transform: scale(1); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        .click-effect {
            position: absolute;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: ripple 0.4s linear;
            z-index: 9998;
        }

        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="google-bg">
        <div class="google-logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>
        <div class="search-bar" id="searchBar">
            <input type="text" id="fakeSearchInput" autocomplete="off" placeholder="Buscar en Google o escribir una URL">
        </div>
    </div>

    <div class="app-window" id="appWindow">
        <div class="header">
            <div class="title">🚀 Space Translation</div>
            <div class="close-btn">✕</div>
        </div>
        <div class="separator"></div>
        <div class="controls">
            <select style="width: 130px;"><option>Google Translate</option></select>
            <span class="label">De:</span>
            <select style="width: 60px;">
                <option>auto</option><option>es</option><option>en</option>
            </select>
            <span class="label">A:</span>
            <select style="width: 60px;">
                <option>en</option><option>es</option>
            </select>
        </div>
        <div class="text-area-container">
            <textarea id="textInput" placeholder="Escribe aquí tu texto para traducir..."></textarea>
        </div>
        <div class="buttons">
            <div class="btn btn-translate" id="btnTranslate">Traducir</div>
            <div class="btn btn-insert" id="btnInsert">Insertar</div>
            <div class="btn btn-action">Traducir e Insertar</div>
        </div>
        <div class="shortcuts">Ctrl+Enter: Traducir | Ctrl+I: Insertar | Ctrl+Fin: Todo | Esc: Cerrar</div>
    </div>

    <!-- Mouse cursor icon -->
    <svg id="cursor" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4-4.4 4.7z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>

    <script>
        const cursor = document.getElementById('cursor');
        const appWindow = document.getElementById('appWindow');
        const searchInput = document.getElementById('fakeSearchInput');
        const searchBar = document.getElementById('searchBar');
        const textInput = document.getElementById('textInput');
        const btnTranslate = document.getElementById('btnTranslate');
        const btnInsert = document.getElementById('btnInsert');

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function moveCursor(el, offsetX = 0, offsetY = 0) {
            const rect = el.getBoundingClientRect();
            const x = rect.left + rect.width / 2 + offsetX;
            const y = rect.top + rect.height / 2 + offsetY;
            cursor.style.left = `${x}px`;
            cursor.style.top = `${y}px`;
            return sleep(450); // wait for CSS transition
        }

        function clickCursor() {
            cursor.classList.add('cursor-click');
            
            // ripple effect
            const ripple = document.createElement('div');
            ripple.className = 'click-effect';
            ripple.style.left = cursor.style.left;
            ripple.style.top = cursor.style.top;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 400);

            setTimeout(() => cursor.classList.remove('cursor-click'), 200);
            return sleep(200);
        }

        async function typeText(el, text) {
            for (let i = 0; i < text.length; i++) {
                el.value += text[i];
                await sleep(60);
            }
        }

        async function runDemo() {
            // Reset state
            searchInput.value = "";
            textInput.value = "";
            appWindow.classList.remove('active');
            cursor.style.left = '80%';
            cursor.style.top = '60%';
            btnTranslate.style.opacity = '1';
            btnTranslate.innerText = 'Traducir';
            await sleep(1000);

            // 1. Move to search bar & click
            await moveCursor(searchBar);
            await clickCursor();

            // 2. Open Space Translation (Ctrl+Inicio simulation)
            await sleep(800);
            appWindow.classList.add('active');
            await sleep(500);

            // 3. Move to app text area & click
            await moveCursor(textInput);
            await clickCursor();
            
            // 4. Type Spanish text
            await typeText(textInput, "Hola mundo! Space Translation es increíble.");
            await sleep(400);

            // 5. Move to Translate button & click
            await moveCursor(btnTranslate);
            await clickCursor();
            btnTranslate.style.opacity = '0.7';
            btnTranslate.innerText = 'Traduciendo...';

            // Wait for "translation"
            await sleep(1000);
            textInput.value = "Hello world! Space Translation is amazing.";
            btnTranslate.style.opacity = '1';
            btnTranslate.innerText = 'Traducir';
            await sleep(600);

            // 6. Move to Insert button & click
            await moveCursor(btnInsert);
            await clickCursor();
            
            // Simulate injection
            appWindow.classList.remove('active');
            await sleep(300);
            
            // Text appears in search bar
            searchInput.value = "Hello world! Space Translation is amazing.";
            
            // Wait to let user read it, then reset
            await sleep(3000);
        }

        // Loop forever
        async function startLoop() {
            while (true) {
                await runDemo();
            }
        }
        
        // Start automatically
        startLoop();

    </script>
</body>
</html>
